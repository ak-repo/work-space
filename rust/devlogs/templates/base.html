<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DevLogs{% endblock %}</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --secondary: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --light: #f8fafc;
            --dark: #0f172a;
            --border: #cbd5e1;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            line-height: 1.6;
            color: var(--dark);
            background-color: #f1f5f9;
            padding: 1rem;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        header {
            background: var(--primary);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        h1, h2 {
            margin-bottom: 1rem;
        }
        
        h1 a {
            color: inherit;
            text-decoration: none;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            background: var(--primary-dark);
            transition: background 0.2s;
        }
        
        nav a:hover {
            background: #1d4ed8;
        }
        
        main {
            padding: 2rem;
        }
        
        .btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--primary-dark);
        }
        
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        
        .btn-danger:hover {
            background: #dc2626;
        }
        
        .btn-success {
            background: var(--success);
            color: white;
        }
        
        .btn-success:hover {
            background: #059669;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        
        input, textarea {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
        }
        
        textarea {
            min-height: 200px;
            resize: vertical;
        }
        
        .log-list {
            list-style: none;
        }
        
        .log-item {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }
        
        .log-item:last-child {
            border-bottom: none;
        }
        
        .log-title {
            font-size: 1.25rem;
            margin-bottom: 0.25rem;
        }
        
        .log-title a {
            color: var(--primary);
            text-decoration: none;
        }
        
        .log-title a:hover {
            text-decoration: underline;
        }
        
        .log-date {
            color: var(--secondary);
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }
        
        .log-summary {
            color: var(--dark);
        }
        
        .actions {
            margin-top: 1rem;
            display: flex;
            gap: 0.5rem;
        }
        
        .summary-section {
            background: #f1f5f9;
            padding: 1rem;
            border-radius: 4px;
            margin-top: 1rem;
        }
        
        footer {
            text-align: center;
            padding: 1rem;
            color: var(--secondary);
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="/">DevLogs</a></h1>
            <nav>
                <a href="/logs/new">New Log</a>
            </nav>
        </header>
        
        <main>
            {% block content %}{% endblock %}
        </main>
        
        <footer>
            <p>DevLogs - A simple development logging system</p>
        </footer>
    </div>
</body>
</html>
